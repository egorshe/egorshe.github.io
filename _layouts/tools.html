---
layout: default
---

<h1 class="page-title">{{ page.title }}</h1>

<ul class="posts">
    {% assign tools = site.tools | sort: 'date' | reverse %} {% for tool in
    tools %} {% if tool.draft != true %}
    <li>
        <a href="{{ site.baseurl }}{{ tool.url }}">{{ tool.title }}</a>
    </li>
    {% endif %} {% endfor %}
</ul>
