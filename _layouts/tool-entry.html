---
layout: default
---

<article class="tool-post">
    <header>
        <h1 class="page-title">{{ page.title }}</h1>

        {% if page.tags and page.tags.size > 0 %}
        <span>
            <i class="fa-solid fa-tags"></i>&nbsp; {% for tag in page.tags %}
            <a href="/tag/{{ tag }}">{{ tag }}</a>{% unless forloop.last %}, {%
            endunless %} {% endfor %}
        </span>
        {% endif %}
    </header>

    <div class="tool-post-content">{{ content }}</div>

    <p style="text-align: left">
        <a href="{{ site.baseurl }}/academic-tools/">Back to list</a>
    </p>
</article>
